name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  R2_ASSET_BUCKET: manjio-assets

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-workers
      url: https://www.manj.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install font subset tools
        run: python -m pip install "fonttools[woff]"

      - name: Generate font subsets
        run: pnpm run fonts:subset

      - name: Build site
        run: pnpm run build

      - name: Upload generated image assets to R2
        run: pnpm run r2:upload-assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Assemble Worker assets
        run: pnpm --filter site-worker run assemble

      - name: Build Slidev decks
        run: pnpm --filter slides run build

      - name: Generate Worker types
        run: pnpm --filter site-worker run types

      - name: Type check
        run: pnpm --filter site-worker run check

      - name: Deploy Worker
        run: pnpm --filter site-worker run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
