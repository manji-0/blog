name: Lint text

on:
  pull_request:
    paths:
      - 'src/content/**/*.md'
      - '.textlintrc.json'
      - '.textlintignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'src/content/**/*.md'
      - '.textlintrc.json'
      - '.textlintignore'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run textlint
        run: pnpm run lint:text
