name: Deploy Cloudflare Status Proxy

on:
  push:
    branches: [main]
    paths:
      - "cloudflare-status-proxy/**"
      - ".github/workflows/deploy-cloudflare-status-proxy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-status-proxy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-status-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Worker types
        run: npm run types

      - name: Type check
        run: npm run check

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
